<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>COL(LAB) · FILLABLE WORKBOOK · Designer Mode Hidden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat+Brush&family=Gaegu:wght@400;700&family=Rock+Salt&family=Kalam:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      font-family: 'Caveat Brush', cursive;
      padding: 1rem;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    
    /* GLOBAL CENTERING */
    .active-page, .page-content, .blob, .cloud-bubble, .speech-blob, .flow-blob,
    .grid-2, .grid-3, .grid-2 > div, .grid-3 > div, h1, h2, h3, h4, p, li, 
    .badge, .btn-mock, .deadline-strip, .deadline-strip span, .prompt-list li,
    .checklist li, .expand-trigger, .expand-block, .user-response, .fill-line,
    .hover-reveal, .hover-container, .hidden-until-hover, .page-indicator,
    .guide-text, .prompt-text, .question-text, .info-text, .logo-placeholder,
    .logo-upload-area {
      text-align: center !important;
      justify-content: center !important;
      align-items: center !important;
    }
    
    .deadline-strip, .grid-2, .grid-3, .color-input, .control-group, .btn {
      display: flex;
      flex-wrap: wrap;
      justify-content: center !important;
    }
    
    .prompt-list, .checklist {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .prompt-list li, .checklist li {
      display: flex;
      justify-content: center;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 0.5rem;
      width: 100%;
    }
    
    /* PRINT STYLES */
    @media print {
      body { background: white; padding: 0; margin: 0; }
      .control-panel, .page-navigator, .drag-status-badge, .btn, .control-group button, .expand-trigger, .page-indicator, .edit-mode-toggle, .resize-handle, .logo-upload-area, .designer-badge { display: none !important; }
      .active-page { box-shadow: none; border: 1px solid #ccc; page-break-after: always; page-break-inside: avoid; margin: 0; padding: 0; background: #f7f3ec !important; height: auto; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .reveal-content, .hidden-until-hover, .expand-block { display: block !important; opacity: 1 !important; max-height: none !important; padding: 0.5rem !important; background: #f0f0f0 !important; }
      .draggable { position: static !important; left: auto !important; top: auto !important; transform: none !important; }
      .user-response, .fill-line { border-bottom: 2px solid #000 !important; display: inline-block !important; }
      .active-page { background-image: var(--print-bg, none) !important; background-size: cover !important; }
    }
    
    .viewport { max-width: 1100px; width: 100%; margin: 0 auto; position: relative; }
    .active-page {
      position: relative;
      padding: 2rem 1.5rem;
      background: #f7f3ec;
      border: 4px solid #0A1636;
      box-shadow: 12px 12px 0 #0A1636;
      transition: box-shadow 0.2s, transform 0.2s, opacity 0.4s ease-in-out;
      min-height: 650px;
      background-size: cover !important;
      background-position: center center !important;
      background-repeat: no-repeat !important;
      border-radius: 32px;
    }
    .page-fade-out { opacity: 0; transform: translateY(8px); transition: opacity 0.25s ease, transform 0.3s ease; }
    .page-fade-in { opacity: 1; transform: translateY(0); transition: opacity 0.35s ease, transform 0.35s ease; }
    
    /* PAGE NAVIGATOR BELOW */
    .page-navigator {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.7rem;
      margin-top: 1.8rem;
      margin-bottom: 0.5rem;
      background: #0A1636AA;
      backdrop-filter: blur(8px);
      padding: 0.8rem 1rem;
      border-radius: 60px;
      border: 2px solid #EA641B;
    }
    .nav-thumb {
      background: #f7f3ec;
      border: 2px solid #0A1636;
      border-radius: 40px;
      padding: 0.4rem 1rem;
      font-family: 'Permanent Marker', cursive;
      cursor: pointer;
      transition: 0.1s linear;
      box-shadow: 2px 2px 0 #0A1636;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.9rem;
    }
    .nav-thumb.active-thumb { background: #EA641B; color: white; border-color: white; transform: scale(1.02); }
    .nav-thumb:hover { background: #EA641B80; transform: translateY(-2px); }
    
    /* DESIGNER CONTROL PANEL - hidden by default, only visible in designer mode */
    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 380px;
      background: #0A1636;
      border: 3px solid #EA641B;
      padding: 1rem;
      z-index: 10000;
      border-radius: 20px;
      box-shadow: 10px 10px 0 rgba(0,0,0,0.4);
      font-family: 'Kalam', cursive;
      transition: opacity 0.3s, transform 0.3s;
      opacity: 0;
      transform: translateX(420px);
      pointer-events: none;
      max-height: 85vh;
      overflow-y: auto;
    }
    .control-panel.visible { opacity: 1; transform: translateX(0); pointer-events: auto; }
    .control-panel h3 { font-family: 'Permanent Marker', cursive; color: #EA641B; margin-bottom: 1rem; border-bottom: 2px solid #EA641B; text-align: center; }
    .control-group { margin-bottom: 1rem; padding-bottom: 0.8rem; border-bottom: 1px dashed #EA641B; }
    .control-group label { display: block; font-size: 0.8rem; color: #94B7F0; margin: 0.3rem 0; text-align: center; }
    .control-group input, .control-group select, .control-group textarea { width: 100%; padding: 0.4rem; background: #f7f3ec; border: 1px solid #EA641B; font-family: 'Kalam'; border-radius: 12px; text-align: center; }
    .color-input { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; justify-content: center; }
    .btn {
      background: #EA641B;
      border: 1px solid #f7f3ec;
      padding: 0.3rem 0.8rem;
      font-family: 'Permanent Marker', cursive;
      color: white;
      cursor: pointer;
      margin: 0.1rem;
      font-size: 0.7rem;
      border-radius: 40px;
      transition: all 0.2s;
    }
    .btn:hover { background: #c85312; transform: scale(1.02); }
    .edit-mode-toggle { background: #4a8ab5 !important; }
    
    .draggable { position: relative; cursor: grab; transition: all 0.2s; }
    .draggable:active { cursor: grabbing; }
    .drag-mode-active .draggable { cursor: grab; }
    .resize-handle {
      position: absolute; bottom: 4px; right: 4px; width: 16px; height: 16px;
      background: #EA641B; border: 2px solid #0A1636; cursor: nw-resize;
      border-radius: 50%; z-index: 10; opacity: 0;
    }
    .draggable:hover .resize-handle, .selected-element .resize-handle { opacity: 0.8; }
    
    .hover-reveal { position: relative; cursor: help; display: inline-block; }
    .reveal-content {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: #0A1636;
      color: #EA641B;
      padding: 0.6rem 1.2rem;
      font-family: 'Kalam', cursive;
      font-size: 0.85rem;
      white-space: nowrap;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
      z-index: 100;
      border-radius: 20px;
      border: 2px solid #EA641B;
      pointer-events: none;
      box-shadow: 4px 4px 0 #0A1636;
    }
    .hover-reveal:hover .reveal-content { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(-5px); }
    
    .hidden-until-hover {
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      transition: opacity 0.3s ease, max-height 0.4s ease;
      background: rgba(10,22,54,0.08);
      margin: 0;
    }
    .hover-container:hover .hidden-until-hover { opacity: 1; max-height: 300px; padding: 0.8rem 1rem; margin: 1rem 0; }
    
    .expand-block {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(10,22,54,0.05);
    }
    .expand-block.expanded { max-height: 600px; padding: 0.8rem 1rem; margin: 1rem 0; }
    .expand-trigger {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: 'Permanent Marker', cursive;
      background: #EA641B20;
      padding: 0.2rem 1rem;
      border-radius: 40px;
    }
    
    @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
    @keyframes growPulse { 0%{transform:scale(1);} 50%{transform:scale(1.08);} 100%{transform:scale(1);} }
    .shake-effect { animation: shake 0.3s ease-in-out 0s 2; }
    .grow-effect { animation: growPulse 0.4s ease-out; }
    .highlight-effect { animation: highlightFlash 0.6s ease-out; }
    @keyframes highlightFlash { 0%{background:rgba(234,100,27,0);} 30%{background:rgba(234,100,27,0.3);} 100%{background:rgba(234,100,27,0);} }
    
    .interactive-fill, .fill-line, .user-response {
      border: none;
      border-bottom: 3px solid #0A1636;
      background: transparent;
      font-family: 'Kalam', cursive;
      font-size: 1rem;
      min-width: 140px;
      padding: 0.2rem 0.5rem;
      color: #0A1636;
      text-align: center;
    }
    .user-response { display: block; width: 100%; margin: 0.5rem auto; }
    .fill-line[contenteditable="true"]:empty:before { content: "______"; color: #94B7F0; opacity: 0.6; }
    
    /* USER MODE: fillable but no structural editing */
    body.user-mode [contenteditable="true"] {
      outline: none !important;
      border: none !important;
    }
    body.user-mode .selected-element { outline: none !important; }
    body.user-mode .draggable { cursor: default; }
    body.user-mode .resize-handle { display: none; }
    body.user-mode .control-panel { display: none !important; }
    body.user-mode .drag-status-badge { display: none; }
    body.user-mode .designer-badge { display: none; }
    
    /* Designer mode: full editing */
    body.designer-mode [contenteditable="true"] { outline: 1px dashed #EA641B; outline-offset: 2px; cursor: text; }
    body.designer-mode .draggable { cursor: grab; }
    
    .blob, .cloud-bubble, .speech-blob, .flow-blob {
      border: 3px solid #0A1636;
      padding: 1.5rem;
      margin: 1rem 0;
      background: #fffdf5;
      box-shadow: 8px 8px 0 #94B7F0;
      transition: all 0.2s;
    }
    .blob { border-radius: 60% 40% 50% 30% / 40% 50% 60% 50%; }
    .cloud-bubble { border-radius: 50% 20% 50% 20% / 20% 50% 20% 50%; background: #f0f7ff; }
    .speech-blob { border-radius: 40% 60% 30% 70% / 50% 40% 60% 50%; background: #fff5e6; position: relative; }
    .speech-blob::after { content: ''; position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 20px solid #0A1636; }
    .flow-blob { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; background: #e8f0e8; }
    
    h1 { font-size: clamp(2.5rem, 8vw, 5rem); color: #EA641B; margin-bottom: 1rem; font-family: 'Permanent Marker', cursive; }
    h2 { font-size: clamp(1.6rem, 5vw, 2.2rem); margin: 1.5rem 0 1rem; color: #0A1636; }
    h3 { font-size: clamp(1.3rem, 4vw, 1.8rem); margin: 1rem auto; display: inline-block; background: #94B7F0; padding: 0.2rem 1.5rem; border: 2px solid #0A1636; }
    .badge { background: #0A1636; color: #f5f0e1; font-family: 'Permanent Marker', cursive; padding: 0.2rem 1.2rem; border: 2px solid #EA641B; display: inline-block; border-radius: 25px 55px 30px 70px; font-size: 0.9rem; }
    .btn-mock { background: #EA641B; border: 3px solid #0A1636; padding: 0.5rem 1.5rem; font-family: 'Permanent Marker', cursive; display: inline-block; color: white; border-radius: 75px 25px 88px 45px; }
    .grid-2, .grid-3 { display: grid; gap: 1.5rem; margin: 1rem 0; }
    .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .grid-3 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .prompt-list { list-style: none; padding: 0; }
    .prompt-list li { margin: 0.6rem 0; display: flex; align-items: baseline; justify-content: center; gap: 0.6rem; flex-wrap: wrap; }
    .prompt-list li::before { content: "●"; color: #EA641B; font-size: 1.3rem; }
    .checklist { list-style: none; padding: 0; }
    .checklist li { margin: 0.6rem 0; display: flex; align-items: center; justify-content: center; cursor: pointer; gap: 0.5rem; }
    .checklist li.checked::before { content: "✓"; color: #EA641B; font-size: 1.5rem; margin-right: 0.8rem; }
    .checklist li::before { content: "⨀"; font-size: 1.5rem; color: #0A1636; margin-right: 0.8rem; }
    .deadline-strip { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; margin: 1rem 0; padding: 0.8rem 0; border-top: 3px dashed #0A1636; border-bottom: 3px dashed #0A1636; }
    
    .logo-placeholder { margin-top: 2rem; padding: 1rem; border: 2px dashed #EA641B; border-radius: 30px; background: rgba(10,22,54,0.05); }
    .uploaded-logo { max-width: 150px; max-height: 80px; margin-top: 0.5rem; object-fit: contain; }
    .selected-element { outline: 3px solid #EA641B !important; background: rgba(234,100,27,0.05); }
    .drag-status-badge { position: fixed; bottom: 20px; left: 20px; background: #0A1636; color: #EA641B; padding: 0.3rem 1rem; border-radius: 40px; font-family: 'Permanent Marker', cursive; font-size: 0.8rem; z-index: 9999; }
    .page-indicator { position: absolute; bottom: 10px; right: 20px; font-family: 'Permanent Marker', cursive; font-size: 1rem; opacity: 0.5; }
    .designer-badge { position: fixed; bottom: 20px; right: 20px; background: #EA641B; color: #0A1636; padding: 0.3rem 1rem; border-radius: 40px; font-family: monospace; font-size: 0.7rem; z-index: 9998; font-weight: bold; display: none; }
    body.designer-mode .designer-badge { display: block; }
    
    @media (max-width: 700px) { .active-page { padding: 1.5rem 1rem; } .control-panel { width: 300px; right: 10px; top: 10px; } .nav-thumb { padding: 0.2rem 0.7rem; font-size: 0.8rem; } }
  </style>
</head>
<body class="user-mode">

<div class="control-panel" id="controlPanel">
  <h3>🎨 DESIGNER MODE · STYLE WORKBOOK</h3>
  <div class="control-group"><label>✏️ Edit Toggle</label><button class="btn edit-mode-toggle" id="editModeToggleBtn" onclick="toggleContentEdit()">✏️ Enable Text Editing</button></div>
  <div class="control-group"><label>🎯 Drag Mode</label><button class="btn" onclick="toggleDragMode()">Toggle Drag</button><button class="btn" onclick="enableResizing()">Resize Handles</button></div>
  <div class="control-group"><label>✨ Effects (select element)</label><button class="btn" onclick="triggerShake()">Shake</button><button class="btn" onclick="triggerGrow()">Grow</button><button class="btn" onclick="triggerHighlight()">Highlight</button></div>
  <div class="control-group"><label>📁 Fonts</label><select id="fontSelect"><option value="'Permanent Marker', cursive">Permanent Marker</option><option value="'Caveat Brush', cursive">Caveat Brush</option><option value="'Kalam', cursive">Kalam</option></select><div class="color-input"><input type="color" id="fontColor" value="#0A1636"><input type="number" id="fontSize" value="18" style="width:70px"></div><button class="btn" onclick="applyFontToSelected()">Apply to Selected</button></div>
  <div class="control-group"><label>🖼️ Page Background (per page)</label><input type="text" id="bgImageUrl" placeholder="https://source.unsplash.com/featured/1200x800?creative"><button class="btn" onclick="setPageBackgroundImage()">Set BG for this page</button><button class="btn" onclick="clearPageBackground()">Reset to Default</button></div>
  <div class="control-group"><label>➕ Add Element</label><select id="elementType"><option value="blob">Blob</option><option value="cloud">Cloud</option><option value="speech">Speech</option><option value="badge">Badge</option><option value="fill">Fill Line</option></select><button class="btn" onclick="addElement()">Add</button></div>
  <div class="control-group"><label>📄 Export & Save</label><button class="btn" onclick="exportAllPagesAsPDF()">📚 ALL PAGES PDF</button><button class="btn" onclick="exportCompleteHTML()">⬇️ Download FULL HTML (save design)</button><button class="btn" onclick="window.print()">🖨️ Print PDF</button></div>
  <p id="selectionInfo" style="font-size:0.7rem;">Selected: none</p>
  <p style="font-size:0.6rem; color:#EA641B;">🔒 Designer mode active — your changes will be saved when you download HTML</p>
</div>

<div class="viewport">
  <div id="singlePageContainer" class="active-page page-fade-in"></div>
  <div class="page-navigator" id="pageNavigator"></div>
</div>
<div class="drag-status-badge" id="dragStatusBadge">✋ Drag OFF</div>
<div class="designer-badge" id="designerBadge">🎨 DESIGNER MODE ACTIVE</div>

<script>
  // ------------------- DUAL MODE: USER (fillable) + DESIGNER (full edit) ------------------
  let pagesData = [];
  let currentPageIndex = 0;
  let selectedElement = null;
  let dragMode = false;
  let contentEditableEnabled = true;  // for designer sub-toggle
  let resizeEnabled = false;
  let dragState = { dragging: false, element: null, startX: 0, startY: 0, startLeft: 0, startTop: 0 };
  let pageBackgrounds = {};
  const DEFAULT_BG_URL = "url('https://www.transparenttextures.com/patterns/cartographer.png'), linear-gradient(145deg, #fcf8ef 0%, #f5efe3 100%)";
  
  // CHECK FOR DESIGNER MODE: via URL parameter ?designer=true OR triple-tap on logo area
  function isDesignerMode() { return window.location.search.includes('designer=true') || localStorage.getItem('colab_designer_mode') === 'true'; }
  
  function enableDesignerMode() {
    document.body.classList.remove('user-mode');
    document.body.classList.add('designer-mode');
    document.getElementById('controlPanel').classList.add('visible');
    document.getElementById('designerBadge').style.display = 'block';
    localStorage.setItem('colab_designer_mode', 'true');
    // re-init drag listeners if needed
    if(dragMode) initDragListeners();
    enableAllContentEditable(true);
  }
  
  function disableDesignerMode() {
    document.body.classList.remove('designer-mode');
    document.body.classList.add('user-mode');
    document.getElementById('controlPanel').classList.remove('visible');
    document.getElementById('designerBadge').style.display = 'none';
    localStorage.setItem('colab_designer_mode', 'false');
    // turn off drag mode for user
    if(dragMode) toggleDragMode();
    dragMode = false;
    document.getElementById('dragStatusBadge').innerHTML = "✋ Drag OFF";
    enableAllContentEditable(false);
  }
  
  function enableAllContentEditable(enable) {
    document.querySelectorAll('[contenteditable="true"]').forEach(el => {
      if(enable) el.setAttribute('contenteditable', 'true');
      else el.setAttribute('contenteditable', 'false');
    });
    // but fill-lines always stay editable for user (they need to fill)
    if(!enable) {
      document.querySelectorAll('.fill-line, .user-response').forEach(el => el.setAttribute('contenteditable', 'true'));
    }
  }
  
  // toggle inside designer: text editing on/off
  function toggleContentEdit() {
    if(!isDesignerMode()) return;
    contentEditableEnabled = !contentEditableEnabled;
    const btn = document.getElementById('editModeToggleBtn');
    if(contentEditableEnabled) {
      document.querySelectorAll('[contenteditable="true"]').forEach(el => el.setAttribute('contenteditable', 'true'));
      btn.textContent = '✏️ Text Editing: ON';
    } else {
      document.querySelectorAll('[contenteditable="true"]:not(.fill-line):not(.user-response)').forEach(el => el.setAttribute('contenteditable', 'false'));
      btn.textContent = '🔒 Text Editing: OFF';
    }
  }
  
  function setDefaultBackgroundToPage(container, index) {
    let bg = pageBackgrounds[index];
    if(bg && bg !== '') container.style.backgroundImage = bg;
    else container.style.backgroundImage = DEFAULT_BG_URL;
    container.style.backgroundSize = "cover, cover";
    container.style.backgroundPosition = "center";
  }
  
  function getInitialPages() {
    return [
      `<div class="page-content"><div style="display:flex;justify-content:center;flex-wrap:wrap;gap:1rem;" class="draggable"><span class="badge hover-reveal">CENTER CIRCLE · FULL FOLLOW‑UP<span class="reveal-content">Exclusive pack for COL(LAB) attendees</span></span><span class="badge" style="background:#EA641B;color:#0A1636;">✺ 7‑page expansion ✺</span></div><h1 contenteditable="true" class="draggable">COL(LAB)<br>DIGITAL<br>FOLLOW‑UP PACK</h1><div class="blob hover-container draggable"><span style="font-size:2rem;font-weight:800;" contenteditable="true">Welcome Back,<br>Center Circle C‑réer!</span><div class="hidden-until-hover"><p contenteditable="true">✨ You're part of an exclusive group. This pack is yours to customize.</p></div></div><p style="font-size:1.2rem;margin:1rem 0;" contenteditable="true" class="draggable">Thank you for choosing Center Circle at COL(LAB). This pack expands on the workshopping and gives you templates.</p><div class="btn-mock draggable">START HERE ↓</div></div>`,
      `<div class="page-content"><h3 contenteditable="true">📋 HOW TO USE THIS PACK</h3><div class="grid-2"><div class="cloud-bubble hover-container draggable"><p style="font-family:'Permanent Marker';font-size:1.4rem;" contenteditable="true">This isn't homework.</p><p contenteditable="true">Pick what you need. Start small. It's a continuation of the room — chaotic, useful, real.</p><div class="hidden-until-hover" contenteditable="true">💡 Tip: Click any text to personalize.</div></div><div><ul class="prompt-list"><li contenteditable="true">Expand your A3 worksheet prompts</li><li contenteditable="true">Map resources & people</li><li contenteditable="true">Copy templates & follow up</li></ul></div></div><h2 contenteditable="true">ZONE 1: WHO ARE YOU (DEEPER DIVE)</h2><div class="grid-2"><div><ul class="prompt-list"><li class="prompt-text">What's the story behind your career path? <div class="user-response" contenteditable="true"></div></li><li class="prompt-text">What's the story behind your creative work? <div class="user-response" contenteditable="true"></div></li><li class="prompt-text">What do people misunderstand about what you do? <div class="user-response" contenteditable="true"></div></li></ul></div><div class="speech-blob hover-reveal draggable"><p contenteditable="true"><strong>Reflection Questions:</strong></p><p class="prompt-text">If you could only keep one identity? <div class="user-response" contenteditable="true"></div></p><span class="reveal-content">These questions reveal priorities</span></div></div><div class="deadline-strip draggable"><span>Owner: <span class="fill-line" contenteditable="true"></span></span><span>Deadline: <span class="fill-line" contenteditable="true"></span></span></div></div>`,
      `<div class="page-content"><h2 contenteditable="true">🛠️ ZONE 2: WHAT ARE YOU BUILDING</h2><div class="grid-2"><div class="blob draggable"><h4 contenteditable="true">Fuzzy idea:</h4><ul class="prompt-list"><li class="prompt-text">What problem are you solving? <div class="user-response" contenteditable="true"></div></li><li class="prompt-text">Smallest test in 2 weeks? <div class="user-response" contenteditable="true"></div></li></ul></div><div class="blob draggable"><h4 contenteditable="true">Clearer idea:</h4><ul class="prompt-list"><li class="prompt-text">Success in 3/6/12 months? <div class="user-response" contenteditable="true"></div></li><li class="prompt-text">First milestone? <div class="user-response" contenteditable="true"></div></li></ul></div></div><div class="cloud-bubble draggable"><p contenteditable="true"><strong>Project definition:</strong> I'm building <span class="fill-line" contenteditable="true"></span> for <span class="fill-line" contenteditable="true"></span> to solve <span class="fill-line" contenteditable="true"></span>.</p></div><div class="grid-3"><div class="flow-blob draggable"><h4>Skills:</h4><div class="user-response" contenteditable="true"></div></div><div class="flow-blob draggable"><h4>People:</h4><div class="user-response" contenteditable="true"></div></div><div class="flow-blob draggable"><h4>Resources:</h4><div class="user-response" contenteditable="true"></div></div></div></div>`,
      `<div class="page-content"><h2 contenteditable="true">🔥 ZONE 4: WHAT DRIVES YOU C‑RÉZY</h2><div class="grid-2"><div class="blob draggable"><h4>Personal frustrations:</h4><div class="user-response" contenteditable="true"></div></div><div class="blob draggable"><h4>Market gaps:</h4><div class="user-response" contenteditable="true"></div></div></div><div><span class="expand-trigger" data-target="funnelDemo">⚡ Expand IDEA FUNNEL</span></div><div id="funnelDemo" class="expand-block"><p class="prompt-text">One sentence project: <span class="fill-line" contenteditable="true"></span></p><p class="prompt-text">Smallest test this week: <div class="user-response" contenteditable="true"></div></p></div><h2 contenteditable="true">📌 ZONE 5: ACTION PLAN</h2><div class="grid-3"><div class="speech-blob draggable"><h4>This week:</h4><div class="user-response" contenteditable="true"></div></div><div class="speech-blob draggable"><h4>This month:</h4><div class="user-response" contenteditable="true"></div></div><div class="speech-blob draggable"><h4>This quarter:</h4><div class="user-response" contenteditable="true"></div></div></div></div>`,
      `<div class="page-content"><h2 contenteditable="true">✉️ FOLLOW‑UP TEMPLATES</h2><div class="grid-2"><div class="cloud-bubble draggable"><span class="badge">Collaboration</span><p contenteditable="true">Subject: Following up from COL(LAB)...<br><br>Great meeting you. I'd love to explore how we might connect.</p></div><div class="cloud-bubble draggable"><span class="badge">Skill-share</span><p contenteditable="true">Subject: quick question about [expertise]...<br><br>Would love your perspective for 10min.</p></div><div class="cloud-bubble draggable"><span class="badge">Resource share</span><p contenteditable="true">Came across this and thought of you!</p></div><div class="cloud-bubble draggable"><span class="badge">Accountability</span><p contenteditable="true">Looking for accountability partners — interested?</p></div></div></div>`,
      `<div class="page-content"><h2 contenteditable="true">⏱️ BEST PRACTICES</h2><div class="grid-2"><div class="flow-blob draggable"><h4>Timing:</h4><ul class="prompt-list"><li contenteditable="true">Within 48 hours for warm follow-up</li><li contenteditable="true">1 week for resource sharing</li></ul></div><div class="flow-blob draggable"><h4>Approach:</h4><ul class="prompt-list"><li contenteditable="true">Be specific, lead with value</li><li contenteditable="true">Keep it human</li></ul></div></div><h2 contenteditable="true">📅 30‑DAY CHECK‑IN</h2><ul class="prompt-list"><li class="prompt-text">What from COL(LAB) is still alive? <div class="user-response" contenteditable="true"></div></li><li class="prompt-text">What changed unexpectedly? <div class="user-response" contenteditable="true"></div></li></ul><div class="deadline-strip draggable"><span>30-day check date: <span class="fill-line" contenteditable="true"></span></span></div></div>`,
      `<div class="page-content"><h2 contenteditable="true">🔗 RESOURCES & NEXT STEPS</h2><div class="grid-2"><div class="cloud-bubble draggable"><h4>C‑réer Community</h4><ul class="prompt-list"><li contenteditable="true">Instagram: @c.reer</li><li contenteditable="true">#WorkHardCreerHarder</li></ul></div><div class="speech-blob draggable"><h4>🔮 Coming soon: Membership</h4><div class="btn-mock" contenteditable="true">DM 'MEMBERSHIP' to @c.reer</div></div></div><ul class="checklist draggable"><li contenteditable="true">☐ Review your A3 worksheet</li><li contenteditable="true">☐ Identify 3-5 people to follow up</li><li contenteditable="true">☐ Send first follow-up message</li></ul><div class="logo-placeholder"><div class="logo-upload-area"><label>⬇️ UPLOAD YOUR LOGO</label><input type="file" id="logoUploadInput" accept="image/*"><div id="logoPreview"></div></div></div><p style="margin-top:1rem;" contenteditable="true">WORK HARD. C‑RÉER HARDER.</p></div>`
    ];
  }
  
  function initPages() { pagesData = getInitialPages(); for(let i=0;i<pagesData.length;i++) if(!pageBackgrounds[i]) pageBackgrounds[i] = ''; }
  
  async function renderCurrentPage(animateFade = true) {
    const container = document.getElementById('singlePageContainer');
    if(!container) return;
    if(animateFade) container.classList.add('page-fade-out');
    setTimeout(() => {
      container.innerHTML = pagesData[currentPageIndex];
      setDefaultBackgroundToPage(container, currentPageIndex);
      document.querySelectorAll('#singlePageContainer .blob, #singlePageContainer .cloud-bubble, #singlePageContainer .speech-blob, #singlePageContainer .flow-blob, #singlePageContainer h1, #singlePageContainer h2, #singlePageContainer h3, #singlePageContainer p, #singlePageContainer .badge, #singlePageContainer .btn-mock').forEach(el => { if(!el.classList.contains('draggable')) el.classList.add('draggable'); });
      document.querySelectorAll('#singlePageContainer .fill-line, #singlePageContainer .user-response').forEach(f => f.setAttribute('contenteditable', 'true'));
      attachExpandTriggers(); attachChecklistListeners(); attachSelectionEvents(); attachAutoSaveEdits(); updatePageIndicator();
      if(resizeEnabled && isDesignerMode()) enableResizing();
      if(!isDesignerMode()) enableAllContentEditable(false);
      else if(contentEditableEnabled) enableAllContentEditable(true);
      const logoInput = document.getElementById('logoUploadInput');
      if(logoInput) logoInput.onchange = (e) => { const file = e.target.files[0]; if(file) { const reader = new FileReader(); reader.onload = ev => { let previewDiv = document.getElementById('logoPreview'); if(previewDiv) previewDiv.innerHTML = `<img src="${ev.target.result}" class="uploaded-logo" alt="logo">`; autoSyncCurrentPage(); }; reader.readAsDataURL(file); } };
      if(animateFade) { container.classList.remove('page-fade-out'); container.classList.add('page-fade-in'); setTimeout(() => container.classList.remove('page-fade-in'), 400); }
    }, 120);
  }
  
  function autoSyncCurrentPage() { let container = document.getElementById('singlePageContainer'); if(container && container.querySelector('.page-content')) { pagesData[currentPageIndex] = container.querySelector('.page-content').outerHTML; pageBackgrounds[currentPageIndex] = container.style.backgroundImage; } }
  function attachAutoSaveEdits() { document.querySelectorAll('[contenteditable="true"]').forEach(el => { el.removeEventListener('blur', autoSyncCurrentPage); el.addEventListener('blur', autoSyncCurrentPage); el.addEventListener('input', autoSyncCurrentPage); }); }
  function attachSelectionEvents() { if(!isDesignerMode()) return; document.querySelectorAll('#singlePageContainer .blob, #singlePageContainer .cloud-bubble, #singlePageContainer .speech-blob, #singlePageContainer .flow-blob, #singlePageContainer h1, #singlePageContainer h2, #singlePageContainer h3, #singlePageContainer p, #singlePageContainer .badge, #singlePageContainer .btn-mock').forEach(el => { el.removeEventListener('click', handleClick); el.addEventListener('click', handleClick); }); }
  function handleClick(e) { e.stopPropagation(); let target = e.target.closest('.blob, .cloud-bubble, .speech-blob, .flow-blob, h1, h2, h3, p, .badge, .btn-mock'); if(target) setSelected(target); }
  function setSelected(el) { if(selectedElement) selectedElement.classList.remove('selected-element'); selectedElement = el; if(selectedElement) selectedElement.classList.add('selected-element'); document.getElementById('selectionInfo').innerHTML = selectedElement ? `Selected: ${selectedElement.tagName}` : 'Selected: none'; }
  function attachExpandTriggers() { document.querySelectorAll('.expand-trigger').forEach(tr => { let targetId = tr.getAttribute('data-target'); let block = document.getElementById(targetId); if(block) { tr.removeEventListener('click', () => block.classList.toggle('expanded')); tr.addEventListener('click', () => block.classList.toggle('expanded')); } }); }
  function attachChecklistListeners() { document.querySelectorAll('.checklist li').forEach(li => { li.removeEventListener('click', (e) => { e.stopPropagation(); li.classList.toggle('checked'); autoSyncCurrentPage(); }); li.addEventListener('click', (e) => { e.stopPropagation(); li.classList.toggle('checked'); autoSyncCurrentPage(); }); }); }
  function updatePageIndicator() { let container = document.getElementById('singlePageContainer'); let existing = container.querySelector('.page-indicator'); if(existing) existing.remove(); let ind = document.createElement('div'); ind.className = 'page-indicator'; ind.innerText = `${currentPageIndex+1}/${pagesData.length}`; container.appendChild(ind); }
  function updateNavigator() { const nav = document.getElementById('pageNavigator'); if(!nav) return; nav.innerHTML = ''; for(let i=0;i<pagesData.length;i++){ let thumb=document.createElement('div'); thumb.className='nav-thumb'+(i===currentPageIndex?' active-thumb':''); thumb.innerHTML=`📄 ${i+1}`; thumb.addEventListener('click',()=>{ autoSyncCurrentPage(); currentPageIndex=i; renderCurrentPage(true); updateNavigator(); }); nav.appendChild(thumb); } }
  function toggleDragMode() { if(!isDesignerMode()) return; dragMode = !dragMode; document.getElementById('dragStatusBadge').innerHTML = dragMode ? "✋ Drag: ON" : "✋ Drag: OFF"; if(dragMode){ document.body.classList.add('drag-mode-active'); initDragListeners(); } else { document.body.classList.remove('drag-mode-active'); } }
  function initDragListeners() { document.removeEventListener('mousedown', dragMouseDown); document.addEventListener('mousedown', dragMouseDown); document.addEventListener('mousemove', dragMouseMove); document.addEventListener('mouseup', dragMouseUp); }
  function dragMouseDown(e) { if(!dragMode || !isDesignerMode()) return; const draggable = e.target.closest('.draggable'); if(!draggable || draggable.closest('.control-panel')) return; e.preventDefault(); dragState.dragging = true; dragState.element = draggable; const rect = draggable.getBoundingClientRect(); const parentRect = draggable.parentElement.getBoundingClientRect(); dragState.startX = e.clientX; dragState.startY = e.clientY; dragState.startLeft = rect.left - parentRect.left; dragState.startTop = rect.top - parentRect.top; if (!draggable.style.position || draggable.style.position === 'static') draggable.style.position = 'relative'; draggable.style.left = dragState.startLeft + 'px'; draggable.style.top = dragState.startTop + 'px'; draggable.classList.add('dragging'); }
  function dragMouseMove(e) { if(!dragMode || !dragState.dragging || !isDesignerMode()) return; e.preventDefault(); const dx = e.clientX - dragState.startX; const dy = e.clientY - dragState.startY; dragState.element.style.left = (dragState.startLeft + dx) + 'px'; dragState.element.style.top = (dragState.startTop + dy) + 'px'; autoSyncCurrentPage(); }
  function dragMouseUp() { if(dragState.element) dragState.element.classList.remove('dragging'); dragState.dragging = false; dragState.element = null; autoSyncCurrentPage(); }
  function enableResizing() { if(!isDesignerMode()) return; resizeEnabled = true; document.querySelectorAll('.draggable').forEach(el => { if(!el.querySelector('.resize-handle')) { let handle = document.createElement('div'); handle.className = 'resize-handle'; handle.addEventListener('mousedown', (e) => { e.stopPropagation(); let startW = el.offsetWidth, startH = el.offsetHeight, startX = e.clientX, startY = e.clientY; let onMove = (moveEvent) => { let dw = moveEvent.clientX - startX, dh = moveEvent.clientY - startY; el.style.width = Math.max(80, startW + dw) + 'px'; el.style.height = Math.max(40, startH + dh) + 'px'; autoSyncCurrentPage(); }; document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', () => document.removeEventListener('mousemove', onMove), { once: true }); }); el.appendChild(handle); } }); }
  function triggerShake() { if(selectedElement && isDesignerMode()) { selectedElement.classList.add('shake-effect'); setTimeout(() => selectedElement.classList.remove('shake-effect'), 600); } }
  function triggerGrow() { if(selectedElement && isDesignerMode()) { selectedElement.classList.add('grow-effect'); setTimeout(() => selectedElement.classList.remove('grow-effect'), 400); } }
  function triggerHighlight() { if(selectedElement && isDesignerMode()) { selectedElement.classList.add('highlight-effect'); setTimeout(() => selectedElement.classList.remove('highlight-effect'), 600); } }
  function applyFontToSelected() { if(selectedElement && isDesignerMode()) { selectedElement.style.fontFamily = document.getElementById('fontSelect').value; selectedElement.style.color = document.getElementById('fontColor').value; selectedElement.style.fontSize = document.getElementById('fontSize').value + 'px'; autoSyncCurrentPage(); } }
  function setPageBackgroundImage() { if(!isDesignerMode()) return; let page = document.getElementById('singlePageContainer'); let url = document.getElementById('bgImageUrl').value; if(url) { let bgStyle = `url(${url})`; page.style.backgroundImage = bgStyle; page.style.backgroundSize = 'cover'; pageBackgrounds[currentPageIndex] = bgStyle; autoSyncCurrentPage(); } }
  function clearPageBackground() { if(!isDesignerMode()) return; let page = document.getElementById('singlePageContainer'); page.style.backgroundImage = DEFAULT_BG_URL; pageBackgrounds[currentPageIndex] = ''; autoSyncCurrentPage(); }
  function addElement() { if(!isDesignerMode()) return; let container = document.getElementById('singlePageContainer'); if(!container) return; let type = document.getElementById('elementType').value; let el; if(type === 'blob') { el = document.createElement('div'); el.className = 'blob draggable'; el.innerHTML = '<p contenteditable="true">New organic blob</p>'; } else if(type === 'cloud') { el = document.createElement('div'); el.className = 'cloud-bubble draggable'; el.innerHTML = '<p contenteditable="true">New cloud</p>'; } else if(type === 'speech') { el = document.createElement('div'); el.className = 'speech-blob draggable'; el.innerHTML = '<p contenteditable="true">New speech</p>'; } else if(type === 'badge') { el = document.createElement('span'); el.className = 'badge draggable'; el.setAttribute('contenteditable','true'); el.textContent = 'new badge'; } else if(type === 'fill') { el = document.createElement('span'); el.className = 'fill-line draggable'; el.setAttribute('contenteditable','true'); el.textContent = '______'; } if(el) { container.querySelector('.page-content').appendChild(el); attachSelectionEvents(); if(resizeEnabled) enableResizing(); autoSyncCurrentPage(); } }
  function exportAllPagesAsPDF() { autoSyncCurrentPage(); let wrapper = document.createElement('div'); for(let i=0;i<pagesData.length;i++){ let div=document.createElement('div'); div.style.marginBottom='0'; div.style.pageBreakAfter='always'; div.style.background='#f7f3ec'; div.style.padding='2rem'; let bg = pageBackgrounds[i] || DEFAULT_BG_URL; div.style.backgroundImage = bg; div.style.backgroundSize = 'cover'; div.innerHTML = pagesData[i]; wrapper.appendChild(div); } html2pdf().set({ margin:0, filename:'COLLAB_Workbook.pdf', html2canvas:{ scale:2, backgroundColor:'#f7f3ec', useCORS:true } }).from(wrapper).save(); }
  function exportCompleteHTML() { autoSyncCurrentPage(); let htmlContent = document.documentElement.outerHTML; let blob = new Blob([htmlContent], { type: 'text/html' }); let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'collab_workbook_designer.html'; a.click(); }
  
  window.toggleContentEdit = toggleContentEdit; window.toggleDragMode = toggleDragMode; window.enableResizing = enableResizing; window.triggerShake = triggerShake; window.triggerGrow = triggerGrow; window.triggerHighlight = triggerHighlight; window.applyFontToSelected = applyFontToSelected; window.setPageBackgroundImage = setPageBackgroundImage; window.clearPageBackground = clearPageBackground; window.addElement = addElement; window.exportAllPagesAsPDF = exportAllPagesAsPDF; window.exportCompleteHTML = exportCompleteHTML;
  
  // Triple-tap to toggle designer mode (mobile & desktop)
  let tapCount = 0, tapTimer = null;
  document.addEventListener('click', (e) => { if(e.target.closest('.control-panel')) return; tapCount++; if(tapTimer) clearTimeout(tapTimer); tapTimer = setTimeout(() => { tapCount = 0; }, 800); if(tapCount === 3) { if(isDesignerMode()) disableDesignerMode(); else enableDesignerMode(); renderCurrentPage(false); updateNavigator(); tapCount = 0; } });
  
  initPages(); 
  if(isDesignerMode()) enableDesignerMode(); else disableDesignerMode();
  renderCurrentPage(false); 
  updateNavigator();
</script>
</body>
